spring.data.gemfire.pool.locators=localhost[10334]
spring.application.name=research-trader-agent-processor
server.port=8066

SuggestTradeAdviceFunction

spring.cloud.function.definition=suggestTradeAdviceProcessor
spring.cloud.function.web.path=/functions
spring.cloud.function.web.mappings.suggestTradeAdviceProcessor.path=/functions/news
spring.cloud.function.web.mappings.suggestTradeAdviceProcessor.method=POST
spring.cloud.stream.http.POST=suggestTradeAdviceProcessor
# For Inputs (Consuming data)
spring.cloud.stream.function.bindings.suggestTradeAdviceProcessor-in-0=input
spring.cloud.stream.function.bindings.suggestTradeAdviceProcessor-out-0=output
spring.cloud.stream.bindings.input.destination=stocks.news
spring.cloud.stream.bindings.input.group=processor


springdoc.swagger-ui.path=/swagger-ui.html

# For Outputs (Publishing data)
spring.cloud.stream.bindings.suggestTradeAdviceProcessor-out-0.destination=<topic_or_exchange_name>